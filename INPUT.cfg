[SYSTEM]
xyz_file  = F1N2.xyz                  # space-separated list; jobs run one by one
nproc     = 8                        # CPU cores for Gaussian
mem       = 8GB                      # memory for Gaussian

[THEORY]
method       = MP2                    # DFT functional / MP2 / CCSD etc.
basis        = aug-cc-pVTZ            # basis set (extra keywords appended here)
keywords     = scf=tight              # additional Gaussian route keywords 
charge       = 0                      # total charge  (0=neutral, -1, +1 ...)
multiplicity = 1                      # spin multiplicity (1=singlet, 2=doublet ...)

# NOTE: charge and multiplicity apply to the full cluster.
#       All fragments (rmD, rmA, dimerDA etc.) inherit the same values.
#       If your system has ions or radicals, adjust accordingly.
#       iHBEQuant does NOT auto-detect charge/mult from xyz — set them here.

[THRESHOLDS]
hb_min_dist  = 1.2     # H···A minimum distance (Angstrom)
hb_max_dist  = 2.8     # H···A maximum distance (Angstrom)
hb_min_angle = 100.0   # D-H···A minimum angle  (degrees)
hb_max_angle = 180.0   # D-H···A maximum angle  (degrees)
neighbor_th  = 2.5     # neighbor cutoff (Angstrom)

[RUN]
mode = cal

# gen  =>  write .gjf files only             (no Gaussian run)
# run  =>  write .gjf files + submit to g16  (full calculation)
# cal  =>  parse existing .log files only    (no new submission)
