[SYSTEM]
xyz_file  = [F3N1.xyz
             F3N2.xyz
             F3N3.xyz
             
            ]                              # list of xyz files, can span multiple lines
            
nproc     = 16                             # CPU cores for Gaussian
mem       = 16GB                           # memory for Gaussian
chk       = N                              # Y -> create .fchk for ALL fragments; N -> only parent

[THEORY]
method       = MP2                         # DFT functional / MP2 / CCSD etc.
basis        = aug-cc-pVTZ                 # basis set
frq          = N                           # Y -> frequency for parent; N -> no freq
keywords     = scf=tight                   # additional Gaussian route keywords (optional)
charge       = 0                           # total charge  (0=neutral, -1, +1 ...)
multiplicity = 1                           # spin multiplicity (1=singlet, 2=doublet ...)

[THRESHOLDS]
covtol_cutoff    = 0.3                     # tolerance for covalent bonding (Angstrom) [short range HB 0.2-0.5, long range HB 0.5-0.8]
HB_acceptor      = F, O, N, S              # comma/space separated list of acceptor elements
HB_donor         = F, O, N, S              # elements allowed as donor heavy atoms
neigh_H_cutoff   = 2.5                     # search radius for H atoms around acceptor (Angstrom)
hb_distance_min  = 1.3                     # H...A minimum distance (Angstrom)
hb_distance_max  = 2.3                     # H...A maximum distance (Angstrom)
hb_angle_min     = 120.0                   # D-H...A minimum angle (degrees)
hb_angle_max     = 180.0                   # D-H...A maximum angle (degrees)

[RUN]
mode = run                                 # gen | run | cal
njob = 2                                   # number of parallel Gaussian jobs (only for mode=run)

# NOTE: charge and multiplicity apply to the full cluster. All fragments inherit the same values. If your system has ions or radicals, adjust accordingly.
                                         
